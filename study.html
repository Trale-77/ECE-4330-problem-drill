<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ECE 4330 Problem Drill</title>
    <style>
      :root {
        --bg: #f5f0e8;
        --surface: #fffaf2;
        --surface-strong: #f2eadf;
        --ink: #221f1a;
        --muted: #6f665a;
        --accent: #9d4a2f;
        --border: #d4c7b7;
        --shadow: 0 18px 50px rgba(42, 34, 24, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
        background: radial-gradient(1200px 500px at 15% 0%, #fbf5ec, var(--bg));
        color: var(--ink);
      }

      .page {
        max-width: 1200px;
        margin: 36px auto 80px;
        padding: 0 24px;
      }

      .hero {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 28px 32px;
        box-shadow: var(--shadow);
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(2rem, 2vw + 1.6rem, 3rem);
        letter-spacing: 0.01em;
      }

      .subhead {
        margin: 0;
        color: var(--muted);
        font-size: 1.05rem;
      }

      .controls {
        margin-top: 22px;
        display: grid;
        gap: 16px;
        grid-template-columns: minmax(220px, 320px) minmax(220px, 320px) minmax(220px, 320px) 1fr;
        align-items: end;
      }

      .field label {
        display: block;
        text-transform: uppercase;
        font-size: 0.8rem;
        letter-spacing: 0.14em;
        color: var(--muted);
        margin-bottom: 8px;
      }

      .data-source {
        background: var(--surface-strong);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px 16px;
        color: var(--muted);
      }

      .dropdown {
        position: relative;
      }

      .dropdown-trigger {
        width: 100%;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: #fff;
        font-size: 1rem;
        text-align: left;
        color: var(--ink);
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: pointer;
      }

      .dropdown-menu {
        position: absolute;
        top: calc(100% + 8px);
        left: 0;
        z-index: 9999;
        width: 100%;
        max-height: 300px;
        overflow-y: auto;
        background-color: #fff;
        color: #000;
        border: 1px solid #ccc;
        border-radius: 12px;
        box-shadow: 0 18px 30px rgba(0, 0, 0, 0.12);
        padding: 8px 0;
        display: none;
      }

      .dropdown.open .dropdown-menu {
        display: block;
        height: auto;
      }

      .dropdown-item {
        width: 100%;
        text-align: left;
        background: transparent;
        border: none;
        padding: 10px 14px;
        font-size: 0.96rem;
        cursor: pointer;
      }

      .dropdown-item:hover,
      .dropdown-item.active {
        background: var(--surface-strong);
      }

      .status {
        margin-top: 12px;
        font-size: 0.95rem;
        color: var(--muted);
      }

      .grid {
        margin-top: 28px;
        display: grid;
        gap: 22px;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 20px 22px 24px;
        box-shadow: var(--shadow);
      }

      .card-header {
        display: flex;
        flex-wrap: wrap;
        gap: 8px 12px;
        align-items: center;
        justify-content: space-between;
      }

      .meta {
        font-size: 0.92rem;
        color: var(--muted);
      }

      .tag {
        display: inline-flex;
        align-items: center;
        padding: 4px 10px;
        border-radius: 999px;
        background: var(--surface-strong);
        color: var(--muted);
        font-size: 0.8rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .problem-text {
        margin: 16px 0 14px;
        white-space: pre-wrap;
        line-height: 1.55;
        font-family: "Cambria Math", "STIX Two Math", "Times New Roman", serif;
        font-size: 1.03rem;
        text-rendering: optimizeLegibility;
        font-kerning: normal;
      }

      .problem-text.muted {
        color: var(--muted);
        font-style: italic;
      }

      .solution-text.muted {
        color: var(--muted);
        font-style: italic;
      }

      .diagram-label {
        margin: 10px 0 6px;
        color: var(--muted);
        font-size: 0.88rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .scan-note {
        margin: 8px 0 10px;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .diagram {
        display: block;
        width: 100%;
        max-width: 600px;
        max-height: 520px;
        border-radius: 12px;
        border: 1px solid var(--border);
        margin-bottom: 12px;
        background: #fff;
        object-fit: contain;
      }

      .solution {
        margin-top: 12px;
        padding: 14px 16px;
        border-radius: 12px;
        border: 1px dashed var(--border);
        background: #fffdf8;
        display: none;
      }

      .solution.visible {
        display: block;
      }

      .solution-text {
        white-space: pre-wrap;
        line-height: 1.55;
        font-family: "Cambria Math", "STIX Two Math", "Times New Roman", serif;
        font-size: 1.01rem;
        text-rendering: optimizeLegibility;
        font-kerning: normal;
      }

      .solution-actions {
        margin-top: 12px;
        display: flex;
        gap: 10px;
      }

      .btn {
        border: 1px solid var(--border);
        background: var(--surface-strong);
        color: var(--ink);
        border-radius: 999px;
        padding: 8px 14px;
        cursor: pointer;
        font-size: 0.95rem;
      }

      .btn.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }

      .empty {
        padding: 24px;
        background: var(--surface);
        border-radius: 16px;
        border: 1px dashed var(--border);
        color: var(--muted);
      }

      @media (max-width: 900px) {
        .controls {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <section class="hero">
        <h1>ECE 4330 Problem Drill</h1>
        <p class="subhead">
          Filter by problem type, review every diagram, and reveal solutions when you are ready.
        </p>

        <div class="controls">
          <div class="field dropdown" id="topicDropdown">
            <label for="topicButton">Problem Type</label>
            <button class="dropdown-trigger" id="topicButton" type="button" aria-expanded="false">
              <span id="topicLabel">All</span>
              <span aria-hidden="true">▾</span>
            </button>
            <div class="dropdown-menu" id="topicMenu" role="listbox" aria-hidden="true"></div>
          </div>

          <div class="field dropdown" id="categoryDropdown">
            <label for="categoryButton">Source</label>
            <button class="dropdown-trigger" id="categoryButton" type="button" aria-expanded="false">
              <span id="categoryLabel">All</span>
              <span aria-hidden="true">▾</span>
            </button>
            <div class="dropdown-menu" id="categoryMenu" role="listbox" aria-hidden="true"></div>
          </div>

          <div class="field dropdown" id="sourceItemDropdown">
            <label for="sourceItemButton">Exam / Assignment</label>
            <button class="dropdown-trigger" id="sourceItemButton" type="button" aria-expanded="false">
              <span id="sourceItemLabel">All</span>
              <span aria-hidden="true">▾</span>
            </button>
            <div class="dropdown-menu" id="sourceItemMenu" role="listbox" aria-hidden="true"></div>
          </div>

          <div class="field">
            <label>Data Source</label>
            <div class="data-source">Loaded from <code>output/problems.json</code></div>
          </div>
        </div>

        <div class="status" id="status">Loading problems…</div>
      </section>

      <section class="grid" id="problemList"></section>
    </div>

    <script>
      (() => {
        const state = {
          problems: [],
          topics: ["All"],
          categories: ["All"],
          sourceItems: ["All"],
          currentTopic: "All",
          currentCategory: "All",
          currentSourceItem: "All",
        };

        const statusEl = document.getElementById("status");
        const listEl = document.getElementById("problemList");
        const dropdownEl = document.getElementById("topicDropdown");
        const topicButton = document.getElementById("topicButton");
        const topicMenu = document.getElementById("topicMenu");
        const topicLabel = document.getElementById("topicLabel");
        const categoryDropdown = document.getElementById("categoryDropdown");
        const categoryButton = document.getElementById("categoryButton");
        const categoryMenu = document.getElementById("categoryMenu");
        const categoryLabel = document.getElementById("categoryLabel");
        const sourceItemDropdown = document.getElementById("sourceItemDropdown");
        const sourceItemButton = document.getElementById("sourceItemButton");
        const sourceItemMenu = document.getElementById("sourceItemMenu");
        const sourceItemLabel = document.getElementById("sourceItemLabel");

        if (
          !dropdownEl ||
          !topicMenu ||
          !topicButton ||
          !topicLabel ||
          !categoryDropdown ||
          !categoryMenu ||
          !categoryButton ||
          !categoryLabel ||
          !sourceItemDropdown ||
          !sourceItemMenu ||
          !sourceItemButton ||
          !sourceItemLabel
        ) {
          console.error("Topic dropdown elements not found.");
          statusEl.textContent = "UI error: dropdown elements missing.";
          return;
        }

        const closeDropdown = (wrapper, button, menu) => {
          wrapper.classList.remove("open");
          button.setAttribute("aria-expanded", "false");
          menu.setAttribute("aria-hidden", "true");
        };

        const openDropdown = (wrapper, button, menu) => {
          wrapper.classList.add("open");
          button.setAttribute("aria-expanded", "true");
          menu.setAttribute("aria-hidden", "false");
        };

        const toggleDropdown = (event, wrapper, button, menu) => {
          event.preventDefault();
          const isOpen = wrapper.classList.contains("open");
          if (isOpen) {
            closeDropdown(wrapper, button, menu);
          } else {
            openDropdown(wrapper, button, menu);
          }
        };

        const setStatus = (text) => {
          statusEl.textContent = text;
        };

        const escapeText = (value) => (value == null ? "" : String(value));

        const buildTopics = () => {
          const found = new Set();
          state.problems.forEach((problem) => {
            if (problem && problem.topic) {
              found.add(problem.topic);
            }
          });
          state.topics = ["All", ...Array.from(found).sort()];
        };

        const getCategory = (source) => {
          const normalized = (source || "").toLowerCase();
          if (normalized.includes("assignment")) {
            return "Assignments";
          }
          if (normalized.includes("exam") || normalized.includes("test")) {
            return "Exams";
          }
          if (normalized.includes("lecture")) {
            return "Lectures";
          }
          return "Other";
        };

        const buildCategories = () => {
          const found = new Set();
          state.problems.forEach((problem) => {
            found.add(getCategory(problem.source));
          });
          state.categories = ["All", ...Array.from(found).sort()];
        };

        const SOURCE_ITEM_ORDER = [
          "Assignment 1",
          "Assignment 2",
          "Assignment 3",
          "Assignment 4",
          "Assignment 5",
          "Assignment 6",
          "Assignment 7",
          "Assignment 8",
          "Assignment 9",
          "Assignment 10",
          "Exam 1",
          "Exam 2",
          "Exam 3",
          "Final",
        ];

        const getSourceItem = (source) => {
          const text = String(source || "").trim();

          const assignmentMatch = text.match(/^Assignment\s+(\d+)/i);
          if (assignmentMatch) {
            return `Assignment ${assignmentMatch[1]}`;
          }

          if (/^Assignment 5 Extra/i.test(text)) {
            return "Assignment 5";
          }

          if (/^Linear Exam 1 Review/i.test(text) || /^Test 1 Sample/i.test(text)) {
            return "Exam 1";
          }

          if (/^Exam 2\b/i.test(text) || /^Test 2 Sample/i.test(text)) {
            return "Exam 2";
          }

          if (/^Exam 3\b/i.test(text) || /^Test 3 Sample/i.test(text)) {
            return "Exam 3";
          }

          if (/^Final Sample/i.test(text)) {
            return "Final";
          }

          return "Other";
        };

        const buildSourceItems = () => {
          const found = new Set();
          state.problems.forEach((problem) => {
            const categoryMatch =
              state.currentCategory === "All" ||
              getCategory(problem.source) === state.currentCategory;
            if (categoryMatch) {
              found.add(getSourceItem(problem.source));
            }
          });
          const ordered = Array.from(found).sort((a, b) => {
            const aIndex = SOURCE_ITEM_ORDER.indexOf(a);
            const bIndex = SOURCE_ITEM_ORDER.indexOf(b);
            if (aIndex === -1 && bIndex === -1) {
              return a.localeCompare(b);
            }
            if (aIndex === -1) {
              return 1;
            }
            if (bIndex === -1) {
              return -1;
            }
            return aIndex - bIndex;
          });
          state.sourceItems = ["All", ...ordered];
          if (!state.sourceItems.includes(state.currentSourceItem)) {
            state.currentSourceItem = "All";
            sourceItemLabel.textContent = "All";
          }
        };

        const populateMenu = (menuEl, items, currentValue, onSelect) => {
          menuEl.innerHTML = "";
          items.forEach((itemValue) => {
            const item = document.createElement("button");
            item.type = "button";
            item.className = "dropdown-item";
            item.textContent = itemValue;
            if (itemValue === currentValue) {
              item.classList.add("active");
            }
            item.addEventListener("click", () => {
              onSelect(itemValue);
            });
            menuEl.appendChild(item);
          });
        };

        const ASSET_VERSION = "20260426-1";

        const normalizeImagePath = (path) => {
          const trimmed = String(path || "").trim();
          if (!trimmed) {
            return "";
          }
          if (trimmed.startsWith("http://") || trimmed.startsWith("https://")) {
            return trimmed;
          }
          const cleaned = trimmed.replace(/^\.?\//, "");
          const separator = cleaned.includes("?") ? "&" : "?";
          return `/${cleaned}${separator}v=${ASSET_VERSION}`;
        };

        const renderImages = (images, container, labelText = "Diagram") => {
          if (!images || images.length === 0) {
            return;
          }
          const label = document.createElement("div");
          label.className = "diagram-label";
          label.textContent = labelText;
          container.appendChild(label);

          images.forEach((path) => {
            const resolvedPath = normalizeImagePath(path);
            const img = document.createElement("img");
            img.className = "diagram";
            img.loading = "lazy";
            img.src = resolvedPath;
            img.alt = "Problem diagram";
            img.addEventListener("error", () => {
              const error = document.createElement("div");
              error.className = "meta";
              error.textContent = `Image failed to load: ${resolvedPath}`;
              container.appendChild(error);
              img.remove();
            });
            container.appendChild(img);
          });
        };

        const renderProblems = () => {
          listEl.innerHTML = "";
          const filtered = state.problems.filter((problem) => {
            const topicMatch =
              state.currentTopic === "All" || problem.topic === state.currentTopic;
            const categoryMatch =
              state.currentCategory === "All" ||
              getCategory(problem.source) === state.currentCategory;
            const sourceItemMatch =
              state.currentSourceItem === "All" ||
              getSourceItem(problem.source) === state.currentSourceItem;
            return topicMatch && categoryMatch && sourceItemMatch;
          });

          if (filtered.length === 0) {
            const empty = document.createElement("div");
            empty.className = "empty";
            empty.textContent = "No problems match this filter.";
            listEl.appendChild(empty);
            setStatus("0 problems loaded.");
            return;
          }

          setStatus(`${filtered.length} problems loaded.`);

          filtered.forEach((problem) => {
            const card = document.createElement("article");
            card.className = "card";

            const header = document.createElement("div");
            header.className = "card-header";

            const source = document.createElement("div");
            source.className = "meta";
            source.textContent = escapeText(problem.source || "Untitled problem");

            const tag = document.createElement("div");
            tag.className = "tag";
            tag.textContent = escapeText(problem.topic || "Uncategorized");

            header.appendChild(source);
            header.appendChild(tag);
            card.appendChild(header);

            const rawProblem = escapeText(problem.problem || "").trim();
            const problemTextBad = Boolean(problem.problem_text_bad && problem.problem_scan);
            const text = document.createElement("div");
            text.className = "problem-text";
            if (problemTextBad) {
              text.textContent = "Formatted math is shown in the exact problem scan below.";
              text.classList.add("muted");
            } else if (!rawProblem) {
              text.textContent = (problem.images || []).length
                ? "Problem statement is shown in the diagram."
                : "Problem statement not found.";
              text.classList.add("muted");
            } else {
              text.textContent = rawProblem;
            }
            card.appendChild(text);

            if (problemTextBad && problem.problem_scan) {
              const note = document.createElement("div");
              note.className = "scan-note";
              note.textContent = "Exact problem scan:";
              card.appendChild(note);
              renderImages([problem.problem_scan], card, "Problem Scan");
            }

            renderImages(problem.images || [], card);

            const actions = document.createElement("div");
            actions.className = "solution-actions";

            const solutionBtn = document.createElement("button");
            solutionBtn.type = "button";
            solutionBtn.className = "btn primary";
            solutionBtn.textContent = problem.has_solution ? "Show solution / work" : "No solution";
            solutionBtn.disabled = !problem.has_solution;

            const solutionBox = document.createElement("div");
            solutionBox.className = "solution";

            const solutionText = document.createElement("div");
            solutionText.className = "solution-text";
            const rawSolution = escapeText(problem.solution || "").trim();
            const solutionTextBad = Boolean(problem.solution_text_bad && problem.solution_scan);
            if (solutionTextBad) {
              solutionText.textContent = "Formatted solution is shown in the exact solution scan below.";
              solutionText.classList.add("muted");
            } else if (!rawSolution) {
              solutionText.textContent = (problem.solution_images || []).length
                ? "Solution is shown in the diagram."
                : "Solution not available.";
              solutionText.classList.add("muted");
            } else {
              solutionText.textContent = rawSolution;
            }
            solutionBox.appendChild(solutionText);

            if (problem.solution_scan && (solutionTextBad || !rawSolution)) {
              const solutionNote = document.createElement("div");
              solutionNote.className = "scan-note";
              solutionNote.textContent = "Exact solution scan:";
              solutionBox.appendChild(solutionNote);
              renderImages([problem.solution_scan], solutionBox, "Solution Scan");
            }

            const extraSolutionImages = (problem.solution_images || []).filter(
              (path) => path !== problem.solution_scan
            );
            if (solutionTextBad || !rawSolution) {
              renderImages(extraSolutionImages, solutionBox, "Solution Diagram");
            }

            solutionBtn.addEventListener("click", () => {
              const isVisible = solutionBox.classList.contains("visible");
              solutionBox.classList.toggle("visible", !isVisible);
              solutionBtn.textContent = isVisible ? "Show solution / work" : "Hide solution / work";
            });

            actions.appendChild(solutionBtn);
            card.appendChild(actions);
            card.appendChild(solutionBox);
            listEl.appendChild(card);
          });
        };

        const loadProblems = async () => {
          try {
            const response = await fetch("./output/problems.json", { cache: "no-store" });
            if (!response.ok) {
              throw new Error(`HTTP ${response.status}`);
            }
            state.problems = await response.json();
            buildTopics();
            buildCategories();
            buildSourceItems();
            populateMenu(topicMenu, state.topics, state.currentTopic, (topic) => {
              state.currentTopic = topic;
              topicLabel.textContent = topic;
              closeDropdown(dropdownEl, topicButton, topicMenu);
              renderProblems();
            });
            populateMenu(categoryMenu, state.categories, state.currentCategory, (category) => {
              state.currentCategory = category;
              categoryLabel.textContent = category;
              state.currentSourceItem = "All";
              sourceItemLabel.textContent = "All";
              buildSourceItems();
              populateMenu(sourceItemMenu, state.sourceItems, state.currentSourceItem, (sourceItem) => {
                state.currentSourceItem = sourceItem;
                sourceItemLabel.textContent = sourceItem;
                closeDropdown(sourceItemDropdown, sourceItemButton, sourceItemMenu);
                renderProblems();
              });
              closeDropdown(categoryDropdown, categoryButton, categoryMenu);
              renderProblems();
            });
            populateMenu(
              sourceItemMenu,
              state.sourceItems,
              state.currentSourceItem,
              (sourceItem) => {
                state.currentSourceItem = sourceItem;
                sourceItemLabel.textContent = sourceItem;
                closeDropdown(sourceItemDropdown, sourceItemButton, sourceItemMenu);
                renderProblems();
              }
            );
            renderProblems();
          } catch (error) {
            console.error("Failed to load problems.json", error);
            setStatus("Failed to load problems.json. Run a local server and reload.");
            listEl.innerHTML = "";
            const empty = document.createElement("div");
            empty.className = "empty";
            empty.textContent =
              "Could not load problems.json. Run `py -3 -m http.server 8000` and open http://localhost:8000/study.html";
            listEl.appendChild(empty);
          }
        };

        topicButton.addEventListener("click", (event) =>
          toggleDropdown(event, dropdownEl, topicButton, topicMenu)
        );
        categoryButton.addEventListener("click", (event) =>
          toggleDropdown(event, categoryDropdown, categoryButton, categoryMenu)
        );
        sourceItemButton.addEventListener("click", (event) =>
          toggleDropdown(event, sourceItemDropdown, sourceItemButton, sourceItemMenu)
        );
        document.addEventListener("click", (event) => {
          if (
            !dropdownEl.contains(event.target) &&
            !categoryDropdown.contains(event.target) &&
            !sourceItemDropdown.contains(event.target)
          ) {
            closeDropdown(dropdownEl, topicButton, topicMenu);
            closeDropdown(categoryDropdown, categoryButton, categoryMenu);
            closeDropdown(sourceItemDropdown, sourceItemButton, sourceItemMenu);
          }
        });

        loadProblems();
      })();
    </script>
  </body>
</html>
